# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: obo-function
metadata:
    template: obo-function@0.1.0
services:
    api:
        project: ./src/OBOFunction
        host: appservice
        language: dotnet
    sharepoint-agent:
        project: ./src/SharePointAgent
        host: azure.ai.agent
        language: dotnet
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-4.1-mini
                    version: "2025-04-14"
                  name: gpt-4.1-mini
                  sku:
                    capacity: 30
                    name: GlobalStandard
            startupCommand: dotnet SharePointAgent.dll
